prefix: "&c&lNTroll &8&l»"
no-permission-msg: "%prefix% &cYou don't have permissions..."
config-reloaded-msg: "%prefix% &6Config reloaded!"
troll-enabled-msg: "%prefix% &aTroll plugin enabled!"
troll-disabled-msg: "%prefix% &cTroll plugin disabled!"
troll-status-msg: "%prefix% &6Troll plugin is %status%!"
added-player-msg: "%prefix% &6Player %player% added!"
removed-player-msg: "%prefix% &6Player %player% removed!"
target-player-list-msg: "%prefix% &6Added players: %list%"
break-action-list-msg: "%prefix% &6Block break actions: \n%list%"
backup-reminder-msg: "%prefix% &6IMPORTANT: It is advisable to make a backup before enabling"
player-not-found-msg: "%prefix% &cPlayer not found"
spawn-success-msg: "%prefix% &a%entity% spawned to %player%"
unable-to-apply-flag-msg: "%prefix% &cUnable to apply flag %flag% with value %value%"
# ENABLE THE ENTIRE PLUGIN
# Backup the server before!
enable-troll: false
debug: false
target-players: []
# Chance that an unlucky action happens on block break
unluckyblock-break-chance: 15
# Valid actions:
# disable-drops, cancel-break, destroy-item, spawn-skeleton, spawn-creeper, spawn-invisible-creeper,
# spawn-invisible-charged-creeper, spawn-enderman, spawn-invisible-enderman, spawn-silverfish,
# spawn-baby-zombie, spawn-invisible-silverfish, spawn-arrow, place-bedrock, place-obsidian,
# explosion, spawn-magmacube, spawn-pig-zombie, spawn-baby-pig-zombie, spawn-fireball, spawn-shulker,
# spawn-shulker-bullet
unluckyblock-break-actions:
  overworld:
    disable-drops: 20
    cancel-break: 10
    destroy-item: 5
    spawn-skeleton: 5
    spawn-creeper: 5
    spawn-invisible-creeper: 5
    spawn-invisible-charged-creeper: 5
    spawn-enderman: 5
    spawn-invisible-enderman: 5
    spawn-silverfish: 5
    spawn-baby-zombie: 5
    spawn-invisible-silverfish: 5
    spawn-arrow: 5
    place-bedrock: 5
    place-obsidian: 5
    explosion: 5
  nether:
    disable-drops: 30
    cancel-break: 20
    spawn-enderman: 10
    destroy-item: 10
    spawn-magmacube: 5
    spawn-arrow: 5
    spawn-pig-zombie: 5
    spawn-baby-pig-zombie: 5
    place-obsidian: 5
    spawn-fireball: 5
  end:
    spawn-enderman: 20
    cancel-break: 20
    disable-drops: 20
    destroy-item: 10
    spawn-invisible-enderman: 10
    spawn-shulker: 10
    spawn-shulker-bullet: 10
cancel-block-place-chance: 15
cancel-block-place-sneaking-chance: 30
auto-ignite-tnt-chance: 50
rocket-explosion-chance: 10
# Chance that elytra breaks when player reaches a min height
# Set min-height to -1 to disable
break-elytra:
  min-height: 200
  chance: 25
faster-mob-chance: 25
random-enderpearl-chance: 15
enderpearl:
  random-direction-chance: 10
  endermite-chance: 25